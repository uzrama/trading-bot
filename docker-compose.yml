services:
    db:
        image: postgres:16-alpine
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${POSTGRES__USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES__PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES__DB:-trading_bot}
        expose:
            - '5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES__USER:-postgres} -d ${POSTGRES__DB:-trading_bot}',
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
    # Service for applying migrations before starting the bots
    migrator:
        build: .
        env_file:
            - .env
        environment:
            - POSTGRES__HOST=db
        depends_on:
            db:
                condition: service_healthy
        # Changed from ['uv', 'run', 'alembic', ...] to direct call
        entrypoint: ['alembic', 'upgrade', 'head']
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
    # Discord listener
    discord-listener:
        build: .
        restart: unless-stopped
        env_file:
            - .env
        environment:
            - POSTGRES__HOST=db
        depends_on:
            migrator:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        command: ['discord']
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
    # WebSockets listener
    ws-tracker:
        build: .
        restart: unless-stopped
        env_file:
            - .env
        environment:
            - POSTGRES__HOST=db
        depends_on:
            migrator:
                condition: service_completed_successfully
            redis:
                condition: service_healthy
        command: ['tracker']
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
volumes:
    postgres_data:
